name: learnmark_app
description: Smart Class Check-in & Learning Reflection App for LearnMark.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Navigation
  cupertino_icons: ^1.0.2
  
  # Location Services
  geolocator: ^9.0.2
  
  # QR Code Scanning
  mobile_scanner: ^3.5.0
  
  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.3
  
  # Firebase
  firebase_core: ^2.24.0
  cloud_firestore: ^4.13.0
  firebase_auth: ^4.10.0
  
  # State Management
  provider: ^6.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts temporarily disabled - using default fonts
  # fonts:
  #   - family: Poppins
  #     fonts:
  #       - asset: assets/fonts/Poppins-Regular.ttf
  #       - asset: assets/fonts/Poppins-Bold.ttf
  #         weight: 700
