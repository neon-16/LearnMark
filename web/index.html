<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="LearnMark - Smart Class Check-in & Learning Reflection App">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnMark Web</title>
    <link rel="icon" type="image/png" href="favicon.png"/>
</head>
<body>
    <!-- This script installs service_worker.js to provide PWA functionality to
         application. For more information, see:
         https://developers.google.com/web/fundamentals/primers/service-workers -->
    <script>
        var serviceWorkerVersion = null;
        var scriptLoaded = false;
        function loadMainDartJs() {
            if (scriptLoaded) {
                return;
            }
            scriptLoaded = true;
            var scriptTag = document.createElement('script');
            scriptTag.src = 'main.dart.js';
            scriptTag.type = 'application/javascript';
            document.body.append(scriptTag);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('flutter_service_worker.js').then(function (reg) {
                    function checkSW() {
                        var serviceWorkerVersion = null;
                        navigator.serviceWorker.ready.then(function (res) {
                            serviceWorkerVersion = res.activeWorker.scriptURL.toString().split('/').pop().split('.').slice(0, -2).join('.');

                            navigator.serviceWorker.controller.postMessage({
                                type: 'SKIP_WAITING'
                            });
                        });
                    }
                    loadMainDartJs();
                });
            });
        } else {
            loadMainDartJs();
        }
    </script>
</body>
</html>
